name: Deploy to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: 'project101'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        lfs: true
    
    - name: Pull LFS files
      run: |
        git lfs pull
        echo "Checking model files..."
        ls -la models/
        file models/brain_tumor_model_pytorch_best.pth
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Zip artifact for deployment
      run: |
        zip -r release.zip . -x "*.git*" "venv/*" "__pycache__/*" "*.pyc" "data/*" "notebooks/*" "*.ipynb"

    - name: Smoke test - load model
      run: |
        echo "Running smoke test: attempt to import app and load model"
        python - <<'PY'
import sys, os
sys.path.append(os.getcwd())
from app import load_model
ok = load_model()
print("load_model returned:", ok)
PY
    
    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: release.zip
